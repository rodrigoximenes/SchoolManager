version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: schoolmanager-postgres
    environment:
      POSTGRES_USER:     schooladmin
      POSTGRES_PASSWORD: localpass123
      POSTGRES_DB:       SchoolManager_Master
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schooladmin -d SchoolManager_Master"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: schoolmanager-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongoadmin
      MONGO_INITDB_ROOT_PASSWORD: localpass123
    ports:
      - '27017:27017'
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  mongodata:
